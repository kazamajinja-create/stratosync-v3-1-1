  izumidama_quantum:
    enabled: {lite: true, standard: true, premium: true}
    detail:  {lite: "one_line", standard: "chapter_tail", premium: "chapter_section"}
    collapse_threshold: 0.65

  story:
    enabled: {lite: false, standard: "decadal", premium: "per_chapter"}
    style: "narrative_poetic"
