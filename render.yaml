services:
  - type: web
    name: stratosync-v3-1-1
    runtime: docker
    region: oregon
    plan: pro
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: ENABLE_BILLING
        value: "false"
      - key: STRICT_DB_BOOT
        value: "false"
      - key: API_KEY
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: Asia/Tokyo
      - key: DATABASE_URL
        fromDatabase:
          name: stratosync-db
          property: connectionString
    disk:
      name: stratosync-data
      mountPath: /app/data
      sizeGB: 1

databases:
  - name: stratosync-db
    region: oregon
    plan: basic-1gb
    # diskSizeGB: 15  # optional on flexible plans; omit to use default
